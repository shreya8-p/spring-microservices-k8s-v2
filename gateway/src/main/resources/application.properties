spring.application.name=gateway
server.port=8080
spring.cloud.gateway.mvc.routes[0].id=organization-service
spring.cloud.gateway.mvc.routes[0].uri=http://organization:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/organization/**
spring.cloud.gateway.mvc.routes[1].id=department-service
spring.cloud.gateway.mvc.routes[1].uri=http://department:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/department/**
spring.cloud.gateway.mvc.routes[2].id=employee-service
spring.cloud.gateway.mvc.routes[2].uri=http://employee:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/employee/**
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
