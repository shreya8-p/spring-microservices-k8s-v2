name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      organization-digest: ${{ steps.org.outputs.digest }}
      department-digest: ${{ steps.dept.outputs.digest }}
      employee-digest: ${{ steps.emp.outputs.digest }}
      gateway-digest: ${{ steps.gw.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build organization service
      run: mvn package -DskipTests -f organization/pom.xml

    - name: Build department service
      run: mvn package -DskipTests -f department/pom.xml

    - name: Build employee service
      run: mvn package -DskipTests -f employee/pom.xml

    - name: Build gateway service
      run: mvn package -DskipTests -f gateway/pom.xml

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push organization image
      id: org
      uses: docker/build-push-action@v6
      with:
        context: ./organization
        platforms: linux/amd64,linux/arm64
        push: true
        tags: patilshreya08/organization:latest

    - name: Build and push department image
      id: dept
      uses: docker/build-push-action@v6
      with:
        context: ./department
        platforms: linux/amd64,linux/arm64
        push: true
        tags: patilshreya08/department:latest

    - name: Build and push employee image
      id: emp
      uses: docker/build-push-action@v6
      with:
        context: ./employee
        platforms: linux/amd64,linux/arm64
        push: true
        tags: patilshreya08/employee:latest

    - name: Build and push gateway image
      id: gw
      uses: docker/build-push-action@v6
      with:
        context: ./gateway
        platforms: linux/amd64,linux/arm64
        push: true
        tags: patilshreya08/gateway:latest

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Scan organization image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: patilshreya08/organization:latest
        format: table
        exit-code: '0'

    - name: Scan gateway image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: patilshreya08/gateway:latest
        format: table
        exit-code: '0'

  sign-and-attest:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write

    steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Sign organization image
      run: cosign sign --yes patilshreya08/organization:latest
      continue-on-error: true

    - name: Sign department image
      run: cosign sign --yes patilshreya08/department:latest
      continue-on-error: true

    - name: Sign employee image
      run: cosign sign --yes patilshreya08/employee:latest
      continue-on-error: true

    - name: Sign gateway image
      run: cosign sign --yes patilshreya08/gateway:latest
      continue-on-error: true

    - name: Generate SBOM for organization
      uses: anchore/sbom-action@v0
      with:
        image: patilshreya08/organization:latest
        format: spdx-json
        output-file: organization-sbom.spdx.json
      continue-on-error: true

    - name: Generate SBOM for gateway
      uses: anchore/sbom-action@v0
      with:
        image: patilshreya08/gateway:latest
        format: spdx-json
        output-file: gateway-sbom.spdx.json
      continue-on-error: true

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbom-reports
        path: "*-sbom.spdx.json"
      continue-on-error: true
