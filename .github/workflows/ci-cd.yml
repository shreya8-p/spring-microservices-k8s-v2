name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build organization service
      run: mvn package -DskipTests -f organization/pom.xml

    - name: Build department service
      run: mvn package -DskipTests -f department/pom.xml

    - name: Build employee service
      run: mvn package -DskipTests -f employee/pom.xml

    - name: Build gateway service
      run: mvn package -DskipTests -f gateway/pom.xml

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push organization image
      uses: docker/build-push-action@v5
      with:
        context: ./organization
        push: true
        tags: patilshreya08/organization:latest

    - name: Build and push department image
      uses: docker/build-push-action@v5
      with:
        context: ./department
        push: true
        tags: patilshreya08/department:latest

    - name: Build and push employee image
      uses: docker/build-push-action@v5
      with:
        context: ./employee
        push: true
        tags: patilshreya08/employee:latest

    - name: Build and push gateway image
      uses: docker/build-push-action@v5
      with:
        context: ./gateway
        push: true
        tags: patilshreya08/gateway:latest

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Scan organization image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: patilshreya08/organization:latest
        format: table
        exit-code: '0'

    - name: Scan gateway image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: patilshreya08/gateway:latest
        format: table
        exit-code: '0'
