spring.application.name=organization
server.port=8081
spring.data.mongodb.uri=mongodb://mongodb:27017/organizationdb
spring.cloud.kubernetes.discovery.enabled=true
spring.cloud.kubernetes.loadbalancer.enabled=true
spring.cloud.discovery.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
